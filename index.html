<!DOCTYPE html>
<html>
<head>
    <title>Flowrs</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
        }
        #startScreen {
            display: block;
        }
        #gameScreen {
            display: none;
        }
        #chatbox {
            position: fixed;
            bottom: 10px;
            left: 10px;
            border: 1px solid #ccc;
            padding: 5px;
            width: 300px;
            height: 100px;
            overflow-y: auto;
        }
        #chatInput {
            width: 280px;
        }
        #inventory {
            position: fixed;
            top: 10px;
            right: 10px;
            border: 1px solid #ccc;
            padding: 5px;
            width: 200px;
            height: 300px;
            overflow-y: auto;
        }
        #hotbar {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
        }
        .hotbar-slot {
            border: 1px solid #ccc;
            width: 30px;
            height: 30px;
            margin: 2px;
        }
    </style>
</head>
<body>
    <div id="startScreen">
        <h1>Flowrs</h1>
        <input type="text" id="playerName" placeholder="Enter your name">
        <button id="startButton">Play</button>
    </div>

    <div id="gameScreen">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="chatbox"></div>
        <input type="text" id="chatInput">
        <div id="inventory">
            <h2>Inventory</h2>
            <div id="inventoryItems"></div>
        </div>
        <div id="hotbar">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
